# Render Blueprint for automated deployment
services:
  - type: web
    name: ghp-index-backend
    env: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/teams
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
